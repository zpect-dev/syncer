services:
  db:
    image: postgres:15-alpine
    container_name: profit_pg
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=secret
      - POSTGRES_DB=profit_ecommerce
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  adminer:
    image: adminer
    ports:
      - "8081:8080"
      
volumes:
  pg_data: